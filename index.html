<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL 2026 · Standings</title>
<style>
  :root{--bg:#0b1018;--line:#222c3b;--txt:#eaf0f7;--muted:#8194ac;
    --gold:#f4c64a;--green:#3ddc97;--red:#ff6b6b;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:40px 26px 60px}

  /* header */
  .head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
  h1{font-size:34px;line-height:1.04;margin:0;font-weight:800;letter-spacing:-.5px;text-transform:uppercase}
  .stand{color:var(--gold);font-size:15px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;margin-top:8px}
  .hmeta{text-align:right;color:var(--muted);font-size:13px;white-space:nowrap}
  .hmeta .g{color:var(--txt);font-weight:600}
  .refresh{margin-top:9px;background:transparent;color:var(--muted);border:1px solid var(--line);
    border-radius:8px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .refresh:hover{border-color:var(--gold);color:var(--txt)}
  .refresh:disabled{opacity:.55;cursor:default}
  .rule{height:3px;background:var(--gold);border-radius:2px;margin:16px 0 22px;opacity:.9}

  /* lists */
  .lists{display:flex;gap:0}
  .listcol{flex:1;min-width:0}
  .row{display:flex;align-items:center;position:relative;padding:9px 8px 9px 16px;
    border-bottom:1px solid rgba(255,255,255,.04)}
  .row::before{content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);
    width:4px;height:58%;border-radius:3px;background:var(--accent,transparent)}
  .row.pos{--accent:var(--green)} .row.neg{--accent:var(--red)}
  .row.alt{background:rgba(255,255,255,.022)}
  .row.head{border-bottom:1px solid var(--line);padding-top:0;padding-bottom:8px}
  .row.head::before{display:none}
  .row.head span{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  .c-rk{flex:0 0 32px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums}
  .c-pl{flex:1;min-width:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c-ac{flex:0 0 56px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
  .c-net{flex:0 0 96px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .c-net.pos{color:var(--green)} .c-net.neg{color:var(--red)}

  .dots{display:none}
  footer{color:var(--muted);font-size:12.5px;margin-top:24px}
  #status{text-align:center;padding:70px 20px;color:var(--muted)}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* desktop: divider + breathing room between the two lists */
  @media(min-width:641px){
    .listcol{padding-right:44px}
    .listcol+.listcol{padding-right:0;padding-left:44px;border-left:1px solid var(--line)}
    .swipehint{display:none}
  }
  /* mobile: swipeable carousel */
  @media(max-width:640px){
    .wrap{padding:28px 16px 50px}
    h1{font-size:25px}
    .head-row{flex-direction:column;align-items:flex-start}
    .hmeta{text-align:left}
    .lists{gap:0;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .lists::-webkit-scrollbar{display:none}
    .listcol{flex:0 0 100%;scroll-snap-align:start;padding:0 2px}
    .dots{display:flex;justify-content:center;align-items:center;gap:9px;margin-top:16px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--line);border:none;cursor:pointer;
      padding:0;transition:width .2s,background .2s}
    .dot.on{background:var(--gold);width:24px;border-radius:5px}
    .swipehint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:9px}
  }
</style>
</head>
<body>

<script>
const CONFIG = {
  STANDINGS_CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYHhcC-4lizOpUph6O5iqCSGj9Aqsj81DJFJNhMZZe0YiroB1I_5mEW1x65S2_ff9RCWBWCIxpepy/pub?gid=338141506&single=true&output=csv",
  FIXTURES_CSV:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYHhcC-4lizOpUph6O5iqCSGj9Aqsj81DJFJNhMZZe0YiroB1I_5mEW1x65S2_ff9RCWBWCIxpepy/pub?gid=1376924317&single=true&output=csv",
  TOTAL_GAMES:   72
};
</script>

<div class="wrap">
  <div class="head-row">
    <div>
      <h1>Betting Premier League 2026</h1>
      <div class="stand">Standings</div>
    </div>
    <div class="hmeta">
      <div class="g" id="metaGames">&nbsp;</div>
      <div id="metaDate">&nbsp;</div>
      <button class="refresh" id="refreshBtn" onclick="refresh(this)">↻ Refresh</button>
    </div>
  </div>
  <div class="rule"></div>

  <div id="status"><div class="spin"></div>Loading the latest standings…</div>

  <div id="board" style="display:none">
    <div class="lists" id="lists">
      <div class="listcol" id="col0"></div>
      <div class="listcol" id="col1"></div>
    </div>
    <div class="dots" id="dots"></div>
    <div class="swipehint" id="swipehint"></div>
    <footer id="foot"></footer>
  </div>
</div>

<script>
const fmt = n => (n>=0?"+":"−")+"₹"+Math.abs(n).toFixed(2);
const accFmt = a => (+a.toFixed(1))+"%";
const num = s => { const v=parseFloat(String(s).replace(/[^0-9.\-]/g,'')); return isNaN(v)?null:v; };
const MON={Jan:"January",Feb:"February",Mar:"March",Apr:"April",May:"May",Jun:"June",
  Jul:"July",Aug:"August",Sep:"September",Oct:"October",Nov:"November",Dec:"December"};
function dateFull(d){ if(!d) return ""; const p=d.trim().split(/\s+/);
  return p.length>=2 ? `${p[0]} ${MON[p[1]]||p[1]} 2026` : d; }
function parseCSV(text){const rows=[];let row=[],f='',q=false;for(let i=0;i<text.length;i++){const c=text[i];
  if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
  else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c==='\r'){}else f+=c;}}
  if(f.length||row.length){row.push(f);rows.push(row);}return rows;}
const idx=(h,n)=>h.findIndex(x=>x.trim().toLowerCase()===n.toLowerCase());
const bust=u=>u+(u.includes('?')?'&':'?')+'_='+Date.now();   // cache-bust so refresh pulls fresh data

/* snapshot fallback (through Match 13); live data replaces it when hosted */
const SNAP = {
 players:[["Sahil Bhargava",13,7,178.51],["Vipin",13,6,171.63],["Anant",9,5,139.4],["Abhishek Kumar",11,5,135.09],["Pranav Gour",9,4,125.09],["Aditya Khemka",13,3,115.95],["Asha Kumar",11,8,104.13],["Raghav",13,3,92.75],["Abhinav Benjamin",13,5,83],["Shobhit",13,7,79.5],["Cameron Rogers",9,5,70.19],["Smriti",13,7,57.33],["Amalta Gupta",13,8,56.06],["Praneet Shekhar",13,6,55.69],["Yashovardhan Bhagat",13,6,55.36],["Deeksha",13,3,50.5],["Vidur Dutt",13,8,45.49],["Kc Sachin",13,5,35.55],["Atul",13,6,35.19],["Hevin",13,7,32.66],["Aiswarya",13,8,31.36],["Raashi",13,8,31.36],["Shalu",13,6,25.88],["Prem",13,7,23.01],["Vaibhav Chadha",13,4,19.01],["Josh Parker Allen",13,7,18.43],["Miraj",9,5,17.41],["Kc Siddharth",13,6,14.93],["Abhishek Dubey",13,7,13.7],["Abhishek Shah",13,7,10.9],["Megh",13,7,9.34],["Vibhuti",13,7,6.18],["Arron Dsilva",13,7,6.09],["Hamza",13,7,6.09],["Jay Alangad",13,7,4.59],["Ninisha",13,7,0],["Nachiket",13,2,-1.69],["Amit Vaid",11,5,-2.81],["Anirudh Valiathan",13,7,-3.22],["Kartish",13,6,-8.26],["Akshay Bhambure",13,6,-8.26],["Shikshit",13,6,-11.27],["Krishna",13,6,-11.35],["Aditya Venkateshan",13,5,-13.32],["Shirali",13,6,-14.31],["Siddharth Salian",13,6,-17.66],["Karan",13,6,-19.1],["Aaryan Sharma",13,6,-20.66],["Abhijeet",13,5,-20.9],["Kc Swetha",11,4,-21.47],["Shourya Shukla",13,4,-22.57],["Leonard",9,3,-27.03],["Sheel Dwivedi",13,6,-28.41],["Sharan",13,6,-30],["Vaibhav Dixit",13,6,-30],["Simon",13,5,-33.43],["Akash Rau",13,5,-38.04],["Aditya Dot",13,5,-42.62],["Mohan",13,5,-42.62],["Rahul",13,5,-42.62],["Onam",13,5,-42.72],["Aditya Chauhan",9,3,-45.45],["Sneha Alangad",9,3,-45.45],["Mayank",13,5,-46.07],["Surabhi Anand",13,5,-47.66],["Apuroop",13,4,-47.77],["Sreeradh Radhakrishnan",11,4,-48.01],["Nuri",13,4,-50.87],["Ashish",11,2,-53.23],["Jasper",13,5,-55.18],["Raphael",13,5,-55.18],["Shubham Agarwal",13,5,-55.18],["Philipp",13,5,-55.18],["Surya Prakash",13,4,-55.7],["Vidya",13,4,-60.28],["Abhimanyu",13,4,-61.97],["Siddharth Jain",13,4,-68.01],["Himanshu Shekhar",13,3,-76.34],["Tanima",9,1,-77.42],["Medha Kumar",11,1,-83.23],["Susovan",13,3,-85.42],["Lakshmi",13,2,-104.59],["Ambarish",13,1,-104.81]],
 last:{n:13,date:"15 Jun",home:"Spain",away:"Cape Verde"}, settled:13
};

function readStandings(rows){
  const h=rows[0],ci={p:idx(h,'Player'),g:idx(h,'Games Played'),c:idx(h,'Correct Calls'),n:idx(h,'Net Winnings (Rs)')};
  if(ci.n<0)ci.n=idx(h,'Net Winnings');
  const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i];if(!r[ci.p])continue;
    const gp=num(r[ci.g])||0,net=num(r[ci.n]);if(net===null||gp===0)continue;
    out.push({name:r[ci.p].trim(),gp,correct:num(r[ci.c])||0,net,acc:(num(r[ci.c])||0)/gp*100});}
  return out;
}
function readLast(rows){
  const h=rows[0],ci={d:idx(h,'Date'),res:idx(h,'Result (H/D/A)'),pay:idx(h,'Payout / Winner (Rs)')};
  if(ci.pay<0)ci.pay=idx(h,'Payout / Winner');
  let last=null,settled=0;
  for(let i=1;i<rows.length;i++){const r=rows[i];
    if(num(r[ci.pay])===null||!(r[ci.res]||'').trim())continue;
    settled++; const n=num(r[0]);
    if(!last||n>last.n) last={n,date:(r[ci.d]||'').trim()};}
  return {last,settled};
}

async function load(){
  if(CONFIG.STANDINGS_CSV && CONFIG.FIXTURES_CSV){
    try{
      const [s,f]=await Promise.all([
        fetch(bust(CONFIG.STANDINGS_CSV)).then(r=>r.text()),
        fetch(bust(CONFIG.FIXTURES_CSV)).then(r=>r.text())]);
      const players=readStandings(parseCSV(s));
      const {last,settled}=readLast(parseCSV(f));
      if(players.length && last){ return render(players,last,settled,true); }
    }catch(e){/* blocked (local file) -> snapshot */}
  }
  const players=SNAP.players.map(p=>({name:p[0],gp:p[1],correct:p[2],net:p[3],acc:p[1]?p[2]/p[1]*100:0})).filter(p=>p.gp>0);
  render(players,SNAP.last,SNAP.settled,false);
}

async function refresh(btn){
  if(!(CONFIG.STANDINGS_CSV && CONFIG.FIXTURES_CSV)) return;
  const label=btn.textContent; btn.disabled=true; btn.textContent='Refreshing…';
  try{
    const [s,f]=await Promise.all([
      fetch(bust(CONFIG.STANDINGS_CSV)).then(r=>r.text()),
      fetch(bust(CONFIG.FIXTURES_CSV)).then(r=>r.text())]);
    const players=readStandings(parseCSV(s));
    const {last,settled}=readLast(parseCSV(f));
    if(players.length && last) render(players,last,settled,true);
  }catch(e){}
  btn.textContent=label; btn.disabled=false;
}

function buildColumn(slice,rankStart){
  const head=`<div class="row head"><span class="c-rk">#</span><span class="c-pl">Player</span><span class="c-ac">Acc</span><span class="c-net">Net</span></div>`;
  const rows=slice.map((p,i)=>{const rank=rankStart+i;const neg=p.net<0;
    return `<div class="row ${neg?'neg':'pos'}${i%2?' alt':''}">
      <span class="c-rk">${rank}</span>
      <span class="c-pl">${p.name}</span>
      <span class="c-ac">${accFmt(p.acc)}</span>
      <span class="c-net ${neg?'neg':'pos'}">${fmt(p.net)}</span></div>`;}).join('');
  return head+rows;
}

function setupCarousel(){
  const lists=document.getElementById('lists'), dots=document.getElementById('dots');
  dots.innerHTML='<button class="dot on" data-i="0"></button><button class="dot" data-i="1"></button>';
  const dotEls=[...dots.children], hint=document.getElementById('swipehint');
  dotEls.forEach(d=>d.onclick=()=>lists.scrollTo({left:(+d.dataset.i)*lists.clientWidth,behavior:'smooth'}));
  lists.addEventListener('scroll',()=>{
    const i=Math.round(lists.scrollLeft/lists.clientWidth);
    dotEls.forEach((d,j)=>d.classList.toggle('on',j===i));
    if(hint) hint.style.visibility=i===0?'visible':'hidden';
  });
}

function render(players,last,settled,live){
  document.getElementById('status').style.display='none';
  document.getElementById('board').style.display='block';

  document.getElementById('metaGames').textContent=`After ${settled} of ${CONFIG.TOTAL_GAMES} games`;
  document.getElementById('metaDate').textContent=dateFull(last.date);

  const ranked=[...players].sort((a,b)=>b.net-a.net);
  const half=Math.ceil(ranked.length/2);
  document.getElementById('col0').innerHTML=buildColumn(ranked.slice(0,half),1);
  document.getElementById('col1').innerHTML=buildColumn(ranked.slice(half),half+1);

  document.getElementById('swipehint').textContent=`Swipe for ranks ${half+1}–${ranked.length} →`;
  setupCarousel();

  document.getElementById('foot').innerHTML=
    `Ranked by net winnings · ${ranked.length} players in`+
    (live?` · <span style="color:var(--green)">live</span>`:` · saved snapshot`);
}
load();
</script>
</body>
</html>
