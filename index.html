<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL 2026 · Leaderboard</title>
<style>
  :root{--bg:#0c1118;--panel:#141c27;--line:#243042;--txt:#e8eef6;--muted:#8ba0b8;
    --gold:#f4c64a;--green:#34d399;--red:#f87171;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:26px 16px 70px}
  header{text-align:center;margin-bottom:4px}
  .kicker{letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-size:11px;font-weight:700}
  h1{font-size:28px;margin:6px 0 2px;font-weight:800;letter-spacing:-.5px}
  .through{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
    background:linear-gradient(90deg,rgba(244,198,74,.16),rgba(244,198,74,.05));
    border:1px solid rgba(244,198,74,.4);border-radius:12px;padding:12px 16px;margin:18px 0 6px;text-align:center}
  .through .pill{background:var(--gold);color:#0c1118;font-weight:800;font-size:13px;
    padding:3px 10px;border-radius:999px;white-space:nowrap}
  .through .det{color:var(--txt);font-weight:600;font-size:14.5px}
  .through .sub{color:var(--muted);font-size:12.5px;width:100%}
  .meta{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 8px}
  .meta .live{font-size:12px;color:var(--muted)}
  .meta .live b{color:var(--green)}
  .meta button{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer;font-weight:600}
  .meta button:hover{border-color:var(--gold)}
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{padding:10px 10px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.net{font-weight:700}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .rk{color:var(--muted);width:42px;font-weight:700;text-align:center}
  tr.top1 td{background:rgba(244,198,74,.10)}
  tr.top1 .rk,tr.top2 .rk,tr.top3 .rk{font-size:17px}
  .player{font-weight:600}
  tbody tr:hover td{background:rgba(255,255,255,.025)}
  .acc{color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:26px;line-height:1.8}
  footer a{color:var(--gold);text-decoration:none;font-weight:600}
  footer a:hover{text-decoration:underline}
  #status{text-align:center;padding:60px 20px;color:var(--muted)}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:520px){ td.hidem,th.hidem{display:none} h1{font-size:23px} }
</style>
</head>
<body>

<!-- Live source: same published tabs as the full report -->
<script>
const CONFIG = {
  STANDINGS_CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYHhcC-4lizOpUph6O5iqCSGj9Aqsj81DJFJNhMZZe0YiroB1I_5mEW1x65S2_ff9RCWBWCIxpepy/pub?gid=338141506&single=true&output=csv",
  FIXTURES_CSV:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYHhcC-4lizOpUph6O5iqCSGj9Aqsj81DJFJNhMZZe0YiroB1I_5mEW1x65S2_ff9RCWBWCIxpepy/pub?gid=1376924317&single=true&output=csv",
  REPORT_LINK:   "BPL_2026_Report.html",
  TOTAL_GAMES:   72
};
</script>

<div class="wrap">
  <header>
    <div class="kicker">Betting Premier League · World Cup 2026</div>
    <h1>Leaderboard</h1>
  </header>

  <div id="status"><div class="spin"></div>Loading the latest standings…</div>

  <div id="board" style="display:none">
    <div class="through" id="through"></div>
    <div class="meta">
      <div class="live" id="liveTag"></div>
      <button onclick="location.reload()">↻ Refresh</button>
    </div>
    <table>
      <thead><tr>
        <th class="rk">#</th><th>Player</th>
        <th class="num hidem">Played</th><th class="num hidem">Correct</th>
        <th class="num">Acc</th><th class="num">Net (Rs)</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <footer id="foot"></footer>
  </div>
</div>

<script>
const fmt = n => (n>=0?"+":"−")+"₹"+Math.abs(n).toFixed(2);
const num = s => { const v=parseFloat(String(s).replace(/[^0-9.\-]/g,'')); return isNaN(v)?null:v; };
function parseCSV(text){const rows=[];let row=[],f='',q=false;for(let i=0;i<text.length;i++){const c=text[i];
  if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
  else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c==='\r'){}else f+=c;}}
  if(f.length||row.length){row.push(f);rows.push(row);}return rows;}
const idx=(h,n)=>h.findIndex(x=>x.trim().toLowerCase()===n.toLowerCase());

/* snapshot fallback (through Match 13) so the page renders even when opened from disk.
   When hosted, live data from the sheet replaces this automatically. */
const SNAP = {
 players:[["Sahil Bhargava",13,7,178.51],["Vipin",13,6,171.63],["Anant",9,5,139.4],["Abhishek Kumar",11,5,135.09],["Pranav Gour",9,4,125.09],["Aditya Khemka",13,3,115.95],["Asha Kumar",11,8,104.13],["Raghav",13,3,92.75],["Abhinav Benjamin",13,5,83],["Shobhit",13,7,79.5],["Cameron Rogers",9,5,70.19],["Smriti",13,7,57.33],["Amalta Gupta",13,8,56.06],["Praneet Shekhar",13,6,55.69],["Yashovardhan Bhagat",13,6,55.36],["Deeksha",13,3,50.5],["Vidur Dutt",13,8,45.49],["Kc Sachin",13,5,35.55],["Atul",13,6,35.19],["Hevin",13,7,32.66],["Aiswarya",13,8,31.36],["Raashi",13,8,31.36],["Shalu",13,6,25.88],["Prem",13,7,23.01],["Vaibhav Chadha",13,4,19.01],["Josh Parker Allen",13,7,18.43],["Miraj",9,5,17.41],["Kc Siddharth",13,6,14.93],["Abhishek Dubey",13,7,13.7],["Abhishek Shah",13,7,10.9],["Megh",13,7,9.34],["Vibhuti",13,7,6.18],["Arron Dsilva",13,7,6.09],["Hamza",13,7,6.09],["Jay Alangad",13,7,4.59],["Ninisha",13,7,0],["Nachiket",13,2,-1.69],["Amit Vaid",11,5,-2.81],["Anirudh Valiathan",13,7,-3.22],["Kartish",13,6,-8.26],["Akshay Bhambure",13,6,-8.26],["Shikshit",13,6,-11.27],["Krishna",13,6,-11.35],["Aditya Venkateshan",13,5,-13.32],["Shirali",13,6,-14.31],["Siddharth Salian",13,6,-17.66],["Karan",13,6,-19.1],["Aaryan Sharma",13,6,-20.66],["Abhijeet",13,5,-20.9],["Kc Swetha",11,4,-21.47],["Shourya Shukla",13,4,-22.57],["Leonard",9,3,-27.03],["Sheel Dwivedi",13,6,-28.41],["Sharan",13,6,-30],["Vaibhav Dixit",13,6,-30],["Simon",13,5,-33.43],["Akash Rau",13,5,-38.04],["Aditya Dot",13,5,-42.62],["Mohan",13,5,-42.62],["Rahul",13,5,-42.62],["Onam",13,5,-42.72],["Aditya Chauhan",9,3,-45.45],["Sneha Alangad",9,3,-45.45],["Mayank",13,5,-46.07],["Surabhi Anand",13,5,-47.66],["Apuroop",13,4,-47.77],["Sreeradh Radhakrishnan",11,4,-48.01],["Nuri",13,4,-50.87],["Ashish",11,2,-53.23],["Jasper",13,5,-55.18],["Raphael",13,5,-55.18],["Shubham Agarwal",13,5,-55.18],["Philipp",13,5,-55.18],["Surya Prakash",13,4,-55.7],["Vidya",13,4,-60.28],["Abhimanyu",13,4,-61.97],["Siddharth Jain",13,4,-68.01],["Himanshu Shekhar",13,3,-76.34],["Tanima",9,1,-77.42],["Medha Kumar",11,1,-83.23],["Susovan",13,3,-85.42],["Lakshmi",13,2,-104.59],["Ambarish",13,1,-104.81]],
 last:{n:13,date:"15 Jun",home:"Spain",away:"Cape Verde"}, settled:13
};

function readStandings(rows){
  const h=rows[0],ci={p:idx(h,'Player'),g:idx(h,'Games Played'),c:idx(h,'Correct Calls'),n:idx(h,'Net Winnings (Rs)')};
  if(ci.n<0)ci.n=idx(h,'Net Winnings');
  const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i];if(!r[ci.p])continue;
    const gp=num(r[ci.g])||0,net=num(r[ci.n]);if(net===null||gp===0)continue;
    out.push({name:r[ci.p].trim(),gp,correct:num(r[ci.c])||0,net,acc:(num(r[ci.c])||0)/gp*100});}
  return out;
}
function readLast(rows){
  const h=rows[0],ci={d:idx(h,'Date'),ho:idx(h,'Home (H)'),aw:idx(h,'Away (A)'),
    res:idx(h,'Result (H/D/A)'),pay:idx(h,'Payout / Winner (Rs)')};
  if(ci.pay<0)ci.pay=idx(h,'Payout / Winner');
  let last=null,settled=0;
  for(let i=1;i<rows.length;i++){const r=rows[i];
    if(num(r[ci.pay])===null||!(r[ci.res]||'').trim())continue;
    settled++; const n=num(r[0]);
    if(!last||n>last.n) last={n,date:(r[ci.d]||'').trim(),home:(r[ci.ho]||'').trim(),away:(r[ci.aw]||'').trim()};}
  return {last,settled};
}

async function load(){
  if(CONFIG.STANDINGS_CSV && CONFIG.FIXTURES_CSV){
    try{
      const [s,f]=await Promise.all([
        fetch(CONFIG.STANDINGS_CSV).then(r=>r.text()),
        fetch(CONFIG.FIXTURES_CSV).then(r=>r.text())]);
      const players=readStandings(parseCSV(s));
      const {last,settled}=readLast(parseCSV(f));
      if(players.length && last){ return render(players,last,settled,true); }
    }catch(e){/* blocked (local file) -> snapshot */}
  }
  const players=SNAP.players.map(p=>({name:p[0],gp:p[1],correct:p[2],net:p[3],acc:p[1]?p[2]/p[1]*100:0})).filter(p=>p.gp>0);
  render(players,SNAP.last,SNAP.settled,false);
}

function render(players,last,settled,live){
  document.getElementById('status').style.display='none';
  document.getElementById('board').style.display='block';

  document.getElementById('through').innerHTML=
    `<span class="pill">Results through Match ${last.n}</span>`+
    `<span class="det">${last.home} v ${last.away}${last.date?' · '+last.date:''}</span>`+
    `<span class="sub">${settled} of ${CONFIG.TOTAL_GAMES} group games settled — standings update after each night's results</span>`;

  document.getElementById('liveTag').innerHTML = live
    ? `<b>● Live</b> — pulled from the league sheet`
    : `Saved snapshot (through Match ${last.n}) — host online for live updates`;

  const ranked=[...players].sort((a,b)=>b.net-a.net);
  const medal=['🥇','🥈','🥉'];
  document.getElementById('rows').innerHTML=ranked.map((p,i)=>`
    <tr class="${i<3?'top'+(i+1):''}">
      <td class="rk">${i<3?medal[i]:i+1}</td>
      <td class="player">${p.name}</td>
      <td class="num hidem">${p.gp}</td>
      <td class="num hidem">${p.correct}</td>
      <td class="num acc">${p.acc.toFixed(0)}%</td>
      <td class="num net ${p.net>=0?'pos':'neg'}">${fmt(p.net)}</td>
    </tr>`).join('');

  document.getElementById('foot').innerHTML=
    `Rs.10 per game · winners split the losers' pot · settled once at the end.<br>`+
    `<a href="${CONFIG.REPORT_LINK}">View the full data report →</a>`;
}
load();
</script>
</body>
</html>
