<script>
const ALM=[{"n": "Algeria", "c": "dz", "r": "6/10", "v": "longer horns, more happiness", "d": "In the Algerian flag, green and white represent Islam and purity, while the red in the crescent and star stands for the blood shed in the long and exceptionally violent war of independence from France. The crescent's horns are drawn longer than on most Islamic flags; local tradition holds that longer horns bring happiness. On VE Day, the day Europe celebrated liberation from Nazi Germany, Algerian nationalists marched in Setif carrying this flag. French police moved to break the march. Shooting broke out. What followed was a French military repression of catastrophic scale: airstrikes, naval bombardment, armed settler militias, and systematic killings that left between 6,000 and 45,000 Algerians dead. On the day the Western world celebrated freedom, France was killing Algerians left, right, and centre. The Battle of Algiers is a great film to understand this era."}, {"n": "Argentina", "c": "ar", "r": "7/10", "v": "light and breezy", "d": "Argentina's flag was created by one low-importance general, Manuel Belgrano. Legend says the sun broke through the clouds over Buenos Aires during the protests. Belgrano, an official in a government that swore allegiance to Spain, created and raised this flag for the first time at Rosario, birthplace of Messi and Che Guevara. He had not asked anyone's permission. Argentina was still fighting to be more independent within the Spanish imperial system, and its leaders had not called for full independence. Raising a distinctly new flag was tantamount to declaring a separation the senior leaders were not ready to endorse. When Belgrano reported what he had done to the triumvirate governing Buenos Aires, they ordered him to suppress the flag and pretend nothing happened, so as not to antagonise Spain. Belgrano reportedly ignored the order. The national flag of Argentina was created without authorisation, immediately banned, and revived four years later when they did declare complete independence."}, {"n": "Australia", "c": "au", "r": "2/10", "v": "I agree with the critics", "d": "The Australian flag is called the 'Blue Ensign'. It was chosen after a competition in which five people submitted identical designs, randomly, with the Union Jack and Southern Cross constellation combination. Critics called it a 'bastard flag' from day one. The Bulletin magazine in 1901 called the design a stale rechauffe of the British flag, with no artistic virtue, no national significance: 'Australia is still Britain's little boy. What more natural than that he should accept his father's cut-down garments.' I agree with the critics. Boring flag."}, {"n": "Austria", "c": "at", "r": "7.5/10", "v": "I see bird, I rate up", "d": "The Austrian flag is one of the oldest in the world. Legend says Duke Leopold V's white tunic was soaked red with blood in batshit-crazy combat after the 1191 Siege of Acre during the Third Crusade, except for a clean white band where his sword-belt had been, giving red-white-red. Austrians lay claim to the oldest flag still in use; Denmark has the rival claim. The state flag adds a black eagle that has shed its chains and holds a hammer and sickle, which represent industry and agriculture rather than communism. I see bird, I increase rating."}, {"n": "Belgium", "c": "be", "r": "7/10", "v": "good flag", "d": "The Belgian flag has a backstory from an opera. On August 25, 1830, a performance of Daniel Auber's opera 'La Muette de Portici' in Brussels depicted a Neapolitan uprising against Spanish rule, and a particularly moving solo, 'Amour sacre de la patrie' (Sacred Love of the Fatherland), was way too moving. People poured out of the theatre mid-performance and onto the streets in what became the Belgian Revolution against Dutch rule. Within months, Belgium had declared independence and designed a new flag. It comes from the coat of arms of the medieval Duchy of Brabant: a gold lion with red claws and tongue on a black shield. Reminds me of the Rains of Castamere."}, {"n": "Bosnia & Herzegovina", "c": "ba", "r": "4/10", "v": "designed by committee", "d": "The Bosniaks, Serbs, and Croats who are the main ethnicities could not agree on a flag. Every traditional Bosnian symbol was politically contested. So the UN High Representative, one Carlos Westendorp, just came up with this weirdass flag and got everyone to agree. The triangle is meant to represent how the country looks on a map."}, {"n": "Brazil", "c": "br", "r": "10/10", "v": "10/10, just for the aesthetic", "d": "Ah, what a beautiful flag. The Brazilian colours just pop. The stars in the middle map the mirror image of the exact morning sky above Rio de Janeiro on November 15, 1889, at 8:37 AM, the day Brazil became a republic. They did add some stars later as the number of administrative states increased, as one does. Green and yellow have nothing to do with the Amazon rainforest or gold mines or the anacondas in them, as I believed for long. Green represents the House of Braganza and the first Emperor of Brazil, one Pedro, while the yellow symbolises the House of Habsburg of the Emperor's wife, Maria Leopoldina of Austria."}, {"n": "Canada", "c": "ca", "r": "8/10", "v": "the red is Union Jack red, wink wink", "d": "The current Canadian flag came to being only in 1965, after the 'Great Canadian Flag Debate' in their parliament, moving away from the old British-colony style flag. The maple leaf was chosen to give French Canadians a symbol they could embrace without feeling it was a British colonial emblem. However, the red is the exact shade used in the Union Jack. Wink wink."}, {"n": "Cape Verde", "c": "cv", "r": "4/10", "v": "Atlantic flags, not for me", "d": "Cape Verde is yet another starry flag. The stars represent the ten main islands of the archipelago, arranged as a ring to symbolise unity across the scattered Atlantic chain. Funnily, it is called the 'Green Cape', although I could not find any green at all. When Cape Verde became independent from Portugal in 1975, it adopted the flag of the PAIGC, the revolutionary movement that had fought for both Cape Verde and Guinea-Bissau simultaneously. The plan was for the two countries to eventually merge. The movement's founder, Amilcar Cabral, the intellectual architect and a great political theorist, was assassinated. His brother Luis became the first president of Guinea-Bissau. Then in 1980, a military coup in Guinea-Bissau killed the unification plan entirely, and Cape Verde remained separate. In 1992 it designed a new flag, not in pan-African colours but a more Euro-looking Atlantic blue design."}, {"n": "Colombia", "c": "co", "r": "6.5/10", "v": "Goethe's colour theory", "d": "The Colombia flag has the classic Bolivarian yellow, blue, and red palette. It traces back to Francisco de Miranda, the Venezuelan revolutionary who spent decades trying to liberate Spanish America before the great Simon Bolivar eventually did. Legend says Miranda was having dinner with the German writer Goethe in Hamburg in 1801. Goethe had developed a theory of colour in which yellow, blue, and red were the three primary colours of human experience. He allegedly told Miranda that a people who truly understood the power of colour would use yellow for the golden wealth of the new world, blue for the ocean separating it from the tyranny of the old world, and red for the blood that would have to be shed in between. Miranda adopted this palette, and it passed through him into the flags of Venezuela and the broader Bolivarian movement that liberated much of the continent: Bolivia, Colombia, Ecuador, Panama, Peru, and Venezuela."}, {"n": "Croatia", "c": "hr", "r": "6.5/10", "v": "good shield, basic flag", "d": "Croatia is the first with the pan-Slavic colours, but the centrepiece headliner is the Sahovnica, a red-and-white checkerboard shield. Legend ties it to a 10th-century Croatian king who supposedly won his kingdom in a game of chess against a Venetian or Byzantine ruler, and the board was adopted as a symbol of the victory. Above the chessboard shield sits a crown of five smaller shields, each a historical Croatian land: the oldest Croatian arms (a gold crescent and star on blue), the shield of Dubrovnik (a red stripe on blue, for the old Republic of Ragusa), the Dalmatian shield (three gold lion heads on blue), the Istrian shield (a golden goat on blue), and the Slavonian shield (a white stripe with a running marten between two stars)."}, {"n": "Curacao", "c": "cw", "r": "4.5/10", "v": "so-so flag", "d": "Curacao is a Caribbean country, constituent within the Kingdom of the Netherlands. It might not look it, but the blue above the yellow line and below are different shades, meant to represent the sky and the sea. The two white stars represent the two islands: the main island and the tiny, uninhabited Klein Curacao. The five points on each star represent the five continents the population descends from: Africa (enslaved people brought as a slave-trade hub), Europe (Dutch colonisers and Sephardic Jews via Brazil), the Americas (indigenous Caquetio Arawak), Asia (colonial-era migrants), and Oceania (purely symbolic, the country-makers just wanted it included to say we are a convergence point for history). The local language is Papiamentu, a creole built from Portuguese, Spanish, Dutch, English, and West African languages. Khichdi."}, {"n": "Czechia", "c": "cz", "r": "6/10", "v": "cheeky", "d": "Czechia's white and red are the traditional colours of Bohemia. When Czechoslovakia was created in 1918 from the ruins of the Austro-Hungarian Empire after WW1, it initially flew just the white and red bicolour. A blue triangle was added to distinguish it from the Polish flag. When Czechoslovakia peacefully dissolved into the Czech Republic and Slovakia on January 1, 1993, the Velvet Divorce, named after the Velvet Revolution of 1989 that ended communist rule, the two new countries had to divide the symbols. They agreed that neither successor state would use Czechoslovak state symbols. Slovakia took the Slovak colours. The Czech Republic looked at this agreement, kept the Czechoslovak flag anyway, and has used it ever since. Slovakia protested. The Czechs essentially shrugged. The flag stayed. One of the more cheerfully unapologetic acts of national symbol appropriation in recent European history."}, {"n": "DR Congo", "c": "cd", "r": "9/10", "v": "that diagonal goes hard", "d": "The DR Congo flag is a dramatic one, because it has gone through multiple versions over the years, much like its name, from Free Congo to Zaire to now DR Congo. Sky blue represents peace. Red is the blood of the country's martyrs. Yellow is the country's mineral resources. DRC has an almost absurd amount of cobalt, coltan, gold, diamonds, and copper, which makes it resource-cursed, in near-continuous conflict for ages to get you the coltan in your mobile phones and the cobalt in your electric vehicle batteries. The diagonal stripe is popping and relatively unusual in African flags. I really like it."}, {"n": "Ecuador", "c": "ec", "r": "8.5/10", "v": "cool flag, nice bird", "d": "The Ecuador flag has the classic Latin American yellow-blue-red, also shared by Colombia and Venezuela, all three descending from the flag of Francisco de Miranda and the short-lived Gran Colombia federation of the 1820s. Miranda is said to have chosen the colours after a conversation with Goethe about colour theory, or after watching a sunrise, a story shared across the whole Gran Colombia flag family. The coat of arms features Mount Chimborazo, Ecuador's highest peak. It also shows the Guayas river with a steamship, the first built on the entire South American Pacific coast, which they seem super proud of for some reason. But sure, every country needs its nation-building myths. The bird is a condor, a majestic bird if there ever was one. Around the sun sit the zodiac signs for March, April, May, and June, marking the duration of the March Revolution of 1845 that ousted General Juan Jose Flores. And, like Haiti, the flag depicts itself in the coat of arms."}, {"n": "Egypt", "c": "eg", "r": "7.5/10", "v": "nice bird, good flag", "d": "The Egypt flag is headlined by the golden eagle of Saladin, the first Sultan of Egypt and Syria, referencing the 12th-century Muslim leader who led the war against the Crusaders and recaptured Jerusalem, becoming the defining hero of Arab historical memory. Except he was Kurdish, ethnically not Arab. Red-white-black is the classic Arab Liberation scheme, born from Egypt's 1952 revolution that overthrew the monarchy. Iraq, Syria, Yemen, and Sudan all use variations of the same three colours."}, {"n": "England", "c": "gb-eng", "r": "7/10", "v": "classic, if a bit basic", "d": "The English flag is headlined by the red St George's Cross on white, adopted as an English emblem around the time of the Crusades because it was so easy to stitch onto a crusader's tunic. St George, born in Turkey, became England's patron saint without having any connection to England at all and having never visited. The og knight in the Christian tradition who played the dragon to rescue the princess is this very George, although the story was probably lifted from Perseus and Andromeda. That said, this flag only became widely flown by English football and rugby fans, instead of the Union Jack, in the modern era, especially from the 1990s onward. So this is a flag that has become important now because of football and the FIFA World Cup."}, {"n": "France", "c": "fr", "r": "9/10", "v": "classic of the classics", "d": "The French Tricolore is the og flag that has inspired revolutionary and republican flags worldwide, from Ireland to Mexico to Romania. After the storming of the Bastille heralded the beginning of the French Revolution, the Paris citizen militia wore cockades of blue and red, the medieval colours of the city of Paris, associated with its patron saints Denis and Martin. When Louis XVI came to the Hotel de Ville to meet the crowds, Lafayette, also a veteran of the American Revolution, presented him with the blue-red cockade. The king added white, the colour of the Bourbon monarchy, as a gesture of reconciliation between the crown and the people. The tricolour was born as a handshake between the king and the revolution. Three years later the revolution beheaded him."}, {"n": "Germany", "c": "de", "r": "7/10", "v": "solid flag", "d": "The German flag traces its roots to the 1813 Lutzow Free Corps: soldiers who wore black uniforms with red facings and gold buttons fighting Napoleon. The reason those soldiers wore black coats was not ideological but logistical. They were a volunteer irregular unit and had to fund their own uniforms, and black dye was the cheapest. This accidental patchwork became the symbolic colours of Germany in 1848, removed by the Nazis for the swastika in 1935 and brought back after WW2. For 10 years between 1949 and 1959, East and West Germany used the exact same flag, causing chaos at international events, including the Olympics."}, {"n": "Ghana", "c": "gh", "r": "7/10", "v": "best star placement", "d": "Ghana was one of the first to fly the pan-African colours, the og being, of course, Ethiopia. Kwame Nkrumah, whose name Zohran carries as a middle name, led Ghana to independence from British colonial rule in 1957, the first sub-Saharan African country to gain independence. The red, gold, and green were taken from the flag of the controversial Black segregationist Marcus Garvey's Universal Negro Improvement Association, the Jamaican-born pan-African movement that had swept through Black communities in the Americas and Africa in the 1920s and 1930s. The black star at the centre is the 'Black Star of Africa', inspired by Garvey's Black Star shipping line. The national football team is nicknamed the 'Black Stars' directly after the flag's emblem."}, {"n": "Haiti", "c": "ht", "r": "8/10", "v": "really cool coat of arms", "d": "The Haiti flag was created by tearing the 'white' out of a French tricolour after the revolution by the enslaved Africans. The Phrygian cap makes another appearance at the top of the coat of arms, this time guarded by artillery, which also contains a depiction of the flag itself in a neat self-reference."}, {"n": "Iran", "c": "ir", "r": "7/10", "v": "lots of detailing", "d": "The Iran flag is headlined by an emblem designed by architect and graphic designer Hamid Nadimi. It is a layered piece of visual design. Read it one way and it is the word 'Allah' in stylised Arabic-Persian script. Rotate your head and it is a tulip, the ancient Persian symbol of martyrdom central to Shia faith, the idea being that red tulips grow from the blood of those who died for a cause. It also contains a sword (strength, revolution), an open book (the Quran), and a shape suggesting a globe (claiming the universality of Islam). The Takbir, 'Allahu Akbar', is written 22 times in stylised Kufic script along the inner edges of the green and red bands."}, {"n": "Iraq", "c": "iq", "r": "5/10", "v": "hella awkward, that 2003 scramble", "d": "The Iraq flag is headlined by the takbir, 'Allahu Akbar', in Kufic script. Earlier versions used the phrase in what was said to be Saddam Hussein's own handwriting, but a 2008 redesign switched it to a neutral Kufic style. The red-white-black follows the Arab Liberation colours. If you remember anything from 2003: when Saddam Hussein's statue in Baghdad was toppled, a US Marine draped an American flag over Saddam's face before the statue came down. The image went global. Someone in the Pentagon or White House clocked that an American flag covering an Iraqi dictator's face on Iraqi soil would not be great, propaganda-wise. Operation Iraqi Liberation, after all. Within minutes the American flag was removed and replaced with an Iraqi one. The scramble to change flags in front of live cameras was hella awkward."}, {"n": "Ivory Coast", "c": "ci", "r": "6/10", "v": "Ireland, reversed", "d": "The Ivory Coast flag is almost exactly the flag of Ireland reversed. In fact, at the 2016 Olympics, the Ivory Coast flag was accidentally displayed for Ireland during a medal ceremony. Orange represents the savanna and the northlands, as well as blood and vitality. White in the middle stands for peace and the rivers. Green is for the forests, hope, and the lush south. So the flag maps the country's geography from the dry northern grasslands down to the southern rainforest. It was also a deliberate rejection of pan-African symbolism. President Felix Houphouet-Boigny, the founding leader, had spent years in Paris as a member of the French National Assembly and even served in the French cabinet. He admired French culture and wanted close ties with France, so he rejected the pan-African colours that many neighbouring states adopted, choosing this French-style tricolour."}, {"n": "Japan", "c": "jp", "r": "7/10", "v": "a true classic", "d": "The Japanese flag is called the Hinomaru, or 'circle of the sun', referencing the Shinto supreme sun goddess Amaterasu Omikami, appropriate for the 'Land of the Rising Sun'. The emperor of Japan is also considered a direct descendant, so there is that. During WW2, when a soldier was about to be deployed, family and friends would sign their names in black ink around the red disc. Soldiers carried them as protective talismans. After the war, many American soldiers brought these flags home as souvenirs. A non-profit began systematically tracking them down across America and repatriating them to Japan, working through historical records and DNA databases to find surviving families. But the flag is contested: the pacifist Japan Teachers Union refused to use it in schools, seeing it as a symbol of the militarism that had led Japan into catastrophic war. For decades, no law actually designated it as the official national symbol, until the National Flag Act was passed in 1999."}, {"n": "Jordan", "c": "jo", "r": "6/10", "v": "green fields, red swords", "d": "The Jordan flag is based on the flag of the 1916 Arab Revolt against the Ottomans. The black, white, and green bands and red triangle represent four great Arab dynasties: the Abbasid (black), Umayyad (white), Fatimid (green), and the current Hashemite (red). The white seven-pointed star, added in 1928, stands for the seven verses of Al-Fatiha, the opening chapter of the Quran. King Abdullah II, who rules today, is a 43rd-generation direct descendant of the Prophet Muhammad. The colour scheme is often traced to a medieval poem by Safi al-Din al-Hilli describing Arab virtues by colour: green are our fields, red are our swords."}, {"n": "Mexico", "c": "mx", "r": "8/10", "v": "cool bird", "d": "The Mexican flag is headlined by an eagle perched on a cactus, holding a snake in its beak. According to Aztec legend, the Sun god Huitzilopochtli told the wandering Mexica tribe to found their city wherever they found an eagle perched on a cactus devouring a serpent. They had wandered for generations searching for this sign when they found it on an island in Lake Texcoco, around 1325. They built Tenochtitlan, which became a sophisticated, top-level city. When Hernan Cortes arrived and destroyed it in 1521, he built Mexico City on its ruins. The eagle and the snake were revived when Mexico gained independence from Spain, a deliberate act of reaching back past the colonial period to claim an indigenous heritage. The cactus is a nopal (Opuntia) that produces a red dye, carmine, one of Mexico's most valuable exports because the red was so vivid and stable that it transformed European textile and painting industries."}, {"n": "Morocco", "c": "ma", "r": "5/10", "v": "another star on the pile", "d": "So many flags with stars so far, eh? This star is the Seal of Solomon. Red is for the royal Alaouite family, who proclaim direct descent from the Prophet Muhammad. Colloquially, the five points of the star map the five pillars of Islam: Shahada (profession of faith), Salah (prayer), Zakat (almsgiving), Sawm (fasting), and Hajj (pilgrimage)."}, {"n": "Netherlands", "c": "nl", "r": "3/10", "v": "where is the orange?", "d": "Where is the orange? I always found it strange that the Netherlands do not have orange here. Called the Prinsenvlag, this was actually intended to be orange-white-blue. But the orange dye was chemically unstable and kept fading to red in sunlight, so they gave up in 1937 and adopted the red. Yet the emotion of the orange, with better dyes, makes the national team jerseys orange still. No other country quite has this relationship where the national flag colour and the national identity colour are entirely separate things, both fully operational at once. It emerged in the 1570s during the Dutch Revolt against Spanish Habsburg rule, one of the earliest successful independence movements in European history. It was flown by the Sea Beggars (Watergeuzen), the Dutch rebel naval force that harassed Spanish supply lines at sea. Flying it then marked you as an enemy of the most powerful empire in the world, an explicitly anti-imperial symbol, until the Dutch went full imperial themselves."}, {"n": "New Zealand", "c": "nz", "r": "2/10", "v": "boring (and not Australia)", "d": "Just read the entry on the Australia flag. Remove two stars and make the rest red. In fact, at the 2010 Commonwealth Games, New Zealand athletes were introduced under the Australian flag. Newspapers, broadcasters, and event organisers across the world make the mistake routinely. New Zealand spent NZ$26 million on a referendum to change the flag. Except the Kiwis decided to keep this dumb flag, 56.7% of the vote. The other design, a silver fern, lost because it looked like a beach towel. A stale rechauffe of the British and Australian flag, with no artistic virtue, no national significance. Australia is still Britain's little boy, and NZ its baby brother."}, {"n": "Norway", "c": "no", "r": "6/10", "v": "kinda cool, kinda ugly", "d": "The Norwegian flag is the Danish flag with a blue cross laid over it. Reckon some king saw Denmark and then the clouds in the sky while dreaming, where an angel came to him on an aurora borealis and said fight against the Swedish and be great at the Winter Olympics and build a top sovereign fund using oil money, or something. It apparently contains the most national flags within its design, depending on how you fold it. The red field, white border, and blue Nordic cross have a voodoo geometry that, depending on which section you isolate, produces recognisable fragments of other flags. There is Denmark's Dannebrog. The blue cross on white gives you Finland. The blue-white-red across the horizontal bar gives you France and the Netherlands. The red-white-blue-white-red across the centre gives you Thailand. Echoes of England and Switzerland too. Vexillologists count anywhere between six and ten national flags in this flag of flags."}, {"n": "Panama", "c": "pa", "r": "5/10", "v": "circus-tent energy", "d": "Panama declared independence from Colombia on November 3, 1903, backed by the US, who wanted to build a canal there and had grown frustrated with Colombia's Senate rejecting the necessary treaty. The US Navy conveniently positioned warships to prevent Colombian troops from landing to suppress the revolt. Within days, the US recognised the new republic. Panama got about two weeks to become a country before signing away a ten-mile-wide strip of itself in perpetuity. The Hay-Bunau-Varilla Treaty gave the US control of the Canal Zone in exchange for ten million dollars (ONLY) and an annual payment of two hundred and fifty thousand dollars (ONLY). Philippe Bunau-Varilla, a French engineer, signed the treaty on Panama's behalf before the Panamanian delegation even arrived in Washington, lest they negotiate. All to say, this flag reminds me of a circus or the hat of clowns. Play stupid games, win stupid prizes."}, {"n": "Paraguay", "c": "py", "r": "6/10", "v": "two-faced, literally", "d": "The only flag where the front is legit different from the back. The back has a yellow lion guarding the Phrygian cap, a symbol of liberation and anti-monarchy from the French Revolution, the bonnet de la liberte. It was forced upon the French king sixteenth Louis when the Tuileries palace was stormed. Several Latin American countries like Haiti, Nicaragua, and El Salvador carry it on their flags. Except, funnily enough, the whole tradition rests on a historical mix-up. What is mistakenly called the Phrygian cap is actually the Roman pileus, the freed-slave cap. The French revolutionaries mistook one for the other, and the error propagated across continents and centuries."}, {"n": "Portugal", "c": "pt", "r": "9/10", "v": "colours pop, the Iberians know flags", "d": "The Portuguese flag is headlined by a yellow armillary sphere, a navigational instrument from the so-called 'Age of Discoveries', a sanitised name for Portugal's era of seafaring exploration and warmongering, where they 'discovered' other people on other continents. It references the instruments used by navigators like Vasco da Gama and Henry the Navigator to map the world in the 15th and 16th centuries. The shield holds five smaller blue shields, said to represent five Moorish kings defeated in a 12th-century battle by King Afonso Henriques, which led to the founding of Portugal. Each blue shield bears five white dots, traditionally read as the five wounds of Christ; together they are the 'Quinas'. A neat little story grafted onto a military victory to give it divine sanction. Around the shield are seven golden castles, fortresses taken from the Moors during the reconquest."}, {"n": "Qatar", "c": "qa", "r": "3/10", "v": "definitely not Bahrain", "d": "The Qatari flag is the widest flag of them all, by aspect ratio. It is named 'Al Adaam', referring linguistically to the verb 'to support', as in the central pillars of the house. It is maroon, not red. Red would make it Bahrain. The two flags are almost identical."}, {"n": "Saudi Arabia", "c": "sa", "r": "4/10", "v": "not the prettiest", "d": "The Saudi flag bears the Shahada in Arabic script, the Islamic declaration of faith. Because it carries this sacred text, the flag is never flown at half-mast, even in mourning. Every Saudi flag is technically two layers of fabric, each with a correctly oriented inscription so it reads correctly from both sides. The Shahada and the sword together summarise the founding alliance of the Saudi state: the pact between Muhammad ibn Abd al-Wahhab, a religious reformer preaching a strict, puritan interpretation of Islam, and Muhammad ibn Saud, a local tribal ruler seeking political expansion. Ibn Wahhab offered religious legitimacy; Ibn Saud offered military protection. The sword is the Al Saud family's military power. The Shahada is Wahhabi doctrine. The flag represents a contract between two dynasties that has held, on and off, for nearly three centuries."}, {"n": "Scotland", "c": "gb-sct", "r": "7.5/10", "v": "elegant simplicity", "d": "The Scotland flag is the oldest continuously used national flag in the world right now, dating back to somewhere between 761 CE and 832 CE. Legend goes that a Pictish (old Celtic warrior tribe) king saw the shape of a white cross in the clouds before some random battle. The diagonal cross is for the Christian martyr St Andrew, who asked to be crucified on a diagonal cross, a saltire, because he felt himself unworthy of the regular Jesus cross. It also feeds into the Union Jack. I like the simplicity of the Scot flag."}, {"n": "Senegal", "c": "sn", "r": "6/10", "v": "not a pan-African guy, but respect", "d": "Senegal is our first with the pan-African colours of green-yellow-red. Leopold Sedar Senghor, Senegal's first president, was a great poet and intellectual who had co-founded the Negritude movement in Paris in the 1930s as a literary and philosophical response to French colonial assimilation policy. They asserted that African identity, culture, and heritage were worth celebrating rather than abandoning in pursuit of Frenchness. The pan-African colours are testament to that. And he was a Catholic, in a country that is 95% Muslim. He led it for twenty years without any serious religious conflict, before doing the most unlikely of things: he left. Voluntarily stepped down from the presidency and handed power peacefully to Abdou Diouf. Simply decided he was done and went home to write poetry. Senegal remains one of the most stable democracies on the continent to this day. The flag has never been seized by a military government."}, {"n": "South Africa", "c": "za", "r": "5/10", "v": "too busy for me", "d": "The post-apartheid rainbow flag is one of the most inclusive pieces of national design ever attempted, and it was finalised under extraordinary time pressure over a weekend. The country's first democratic elections were scheduled for April 27, 1994, with no agreed flag until the last moment. Negotiations between the African National Congress, the outgoing National Party government, and various other parties had produced competing proposals but no consensus until this interim flag. The black, green, and gold come from the ANC's colours. The red, white, and blue come from the old Boer republic flags and the British colonial flag, colours of the outgoing white minority government. The Y-design was explicitly meant to say: all of these traditions are now part of one country moving in one direction."}, {"n": "South Korea", "c": "kr", "r": "8/10", "v": "cool and stylish", "d": "The South Korean flag, the Taegukgi, is primarily white, the traditional colour of Korean dress and culture, earning Koreans the historical epithet 'the white-clad people'. The large circle in the centre is the taeguk, a yin-yang symbol representing the continuous balance of opposing cosmic forces: positive and negative, fire and water, heaven and earth, Isa Upanishad style. The four black trigrams in the corners are taken from the I Ching, the ancient Chinese classic of divination and cosmology. Each is a stack of three lines, broken or unbroken. Top-left is heaven, bottom-right is earth, top-right is water, bottom-left is fire. Avatar style. Together they represent a specific cosmological logic about how opposing forces balance each other diagonally: heaven faces earth, fire faces water. An intellectual attempt at world-explanation in a national flag if there ever was one."}, {"n": "Spain", "c": "es", "r": "9/10", "v": "colours pop, love the arms", "d": "The Spain flag, nicknamed the 'Rojigualda', was chosen by King Charles III in 1785 specifically for the formidable Spanish navy, because so many European flags of the era were plain and hard to tell apart at sea. It was picked after a competition to see which design had the most visibility on the water, and became the national flag in 1843 under Queen Isabella II, who was also indirectly responsible for the rules of chess changing and the queen becoming as op as she is these days. The coat of arms includes the Pillars of Hercules wrapped in a ribbon reading 'Plus Ultra' (further beyond), rejecting the old superstitious warning that nothing lay past Gibraltar. Other motifs are the castle of Castile, the lion of Leon, the stripes of Aragon, the chains of Navarre, and the pomegranate of Granada at the base, all worth a Wikipedia rabbit hole at night when you find yourself lonely."}, {"n": "Sweden", "c": "se", "r": "4/10", "v": "boring", "d": "The Scandinavian, or Nordic, cross makes its first appearance. The Sweden flag has it in yellow, which comes from the coat of arms: three gold crowns on a blue field, in use since the 14th century. Legend ties it to some Swedish king, Eric the Ninth, who supposedly saw the cross against a blue sky before a 12th-century battle in Finland. What is with these kings watching clouds in the sky before battle?"}, {"n": "Switzerland", "c": "ch", "r": "5/10", "v": "just neutral", "d": "This is a square flag. It is the exact inverse of the International Red Cross, which has a white background and a red cross. The Red Cross designed theirs in tribute to Switzerland's role as the neutral host nation to the oft-flouted Geneva Conventions."}, {"n": "Tunisia", "c": "tn", "r": "5/10", "v": "strange are the likes of the mind", "d": "The Tunisian flag is one of the older crescent-and-star flags in the world, dating to around 1831 under the Husainid dynasty, even before the Turkish flag. The white circle in the centre represents the sun, and holds a red crescent and five-pointed star, traditional symbols of Islam and good fortune (by way of Byzantium and Mary, of course). The legend is a ruler's dream this time: the Husainid Bey saw a white disc with a crescent on a red banner in his dream, and voila. I mean, it predates the Turkish flag and is sooo similar, but I like that one and do not like this one as much. Strange are the likes and dislikes of the mind."}, {"n": "Turkey", "c": "tr", "r": "7/10", "v": "remains a classic", "d": "The Turkey flag is the classic crescent and star. However, contrary to popular belief, it predates Islam by many centuries. It was developed during the Hellenistic period, sometime between the 4th and 1st century BCE. The symbol most probably originated in Byzantium, whose patron goddess Artemis had the moon as her symbol. Emperor Constantine then added the star, symbol of the Virgin Mary, when he dedicated the city to her after converting to Christianity. Other legends trace it to the Battle of Kosovo in 1389, when a crescent and star appeared in the reflection of soldiers' blood on the battlefield. Another says the founder of the Ottoman dynasty dreamed of a crescent rising from a holy man and entering his own chest. Unusually, Ataturk kept the flag after abolishing the Caliphate without changing it, a deliberate and strange act of continuity."}, {"n": "United States", "c": "us", "r": "4/10", "v": "a fake-news origin story", "d": "This one dude William writes a paper to the Historical Society of Pennsylvania claiming that his grandmother Betsy Ross had 'made with her hands the first flag' of the United States. He heard this from his aunty when he was a child. This legend is what most people believe is the origin of the US flag, and it is often called the Betsy Ross flag. Except it is bogus, fake news, completely made up. This country has always had a rich history of disinformation."}, {"n": "Uruguay", "c": "uy", "r": "7/10", "v": "a country made by Britain", "d": "The Uruguay flag is headlined by the Sun of May, a depiction of Inti, the Inca sun god, as a symbol of independence, also found on the Argentina flag. Both countries were part of the Spanish colonial Viceroyalty of the Rio de la Plata, and both trace the symbol to the same source: a coin struck after the May Revolution of 1810 in Buenos Aires, featuring a sun with a face representing the dawn of independence. Uruguay was created largely by diplomatic convenience rather than organic nationhood. The territory was called the Banda Oriental and was contested for decades between Portuguese Brazil and Spanish Argentina, each of whom occupied it at various points. In 1828, British diplomats brokered the Preliminary Peace that created Uruguay as an independent state, primarily because Britain wanted a stable, neutral territory between two larger powers to protect its trading interests. British commercial pragmatism, creating countries left and right, eh."}, {"n": "Uzbekistan", "c": "uz", "r": "6/10", "v": "a bit too busy", "d": "Uzbekistan is yet another starry flag, meant to honour the great scientific and mathematical tradition of medieval Samarkand: Musa al-Khwarizmi, of algebra fame, and ibn Sina of medicine. The stars also reference the months of the year, the signs of the Uzbek zodiac, and the country's provinces. The blue is meant to evoke Timur the Great, the conqueror who built one of the largest empires in history and made Samarkand his capital, whose banners were blue. The Timurid architectural tradition that produced the extraordinary turquoise-domed mosques of Samarkand and Bukhara is also known for the brilliant blue in them. Considered beautiful by the vexillology community. I do not see it, a bit too busy."}];
const grid=document.getElementById('grid');
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function band(r){const n=parseFloat(r);return n>=8?'hi':n>=6?'mid':'lo';}
ALM.forEach(d=>{
  const b=document.createElement('button'); b.className='tile';
  b.innerHTML='<img loading="lazy" src="https://flagcdn.com/h60/'+d.c+'.png" alt="" onerror="this.style.visibility=\'hidden\'"><span class="tname">'+esc(d.n)+'</span><span class="trate '+band(d.r)+'">'+esc(d.r)+'</span>';
  b.onclick=()=>openPop(d); grid.appendChild(b);
});
const pop=document.getElementById('pop');
function openPop(d){
  document.getElementById('pflag').src='https://flagcdn.com/h240/'+d.c+'.png';
  document.getElementById('pname').textContent=d.n;
  const sc=document.getElementById('pscore'); sc.textContent=d.r; sc.className='pscore '+band(d.r);
  document.getElementById('pverdict').textContent='“'+d.v+'”';
  document.getElementById('pdesc').textContent=d.d;
  pop.classList.add('on');
}
function closePop(){ pop.classList.remove('on'); }
document.getElementById('pclose').onclick=closePop;
pop.onclick=e=>{ if(e.target.id==='pop') closePop(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePop(); });
</script>
