<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL 2026 · Flag Almanac</title>
<meta property="og:type" content="website">
<meta property="og:title" content="BPL Flag Almanac">
<meta property="og:description" content="The flags of all 48 World Cup 2026 nations — tap any flag for the story behind its colours and symbols.">
<meta property="og:image" content="https://kc-siddharth.github.io/bpl-2026/branding/kc_share.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="icon" type="image/png" href="https://kc-siddharth.github.io/bpl-2026/branding/kc_favicon.png">
<link rel="apple-touch-icon" href="https://kc-siddharth.github.io/bpl-2026/branding/apple-touch-icon.png">
<style>
  :root{--bg:#0b1018;--panel:#141c27;--panel2:#1b2532;--line:#243042;--txt:#eaf0f7;
    --muted:#8194ac;--gold:#f4c64a;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:30px 18px 70px}
  .backhub{display:inline-flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:5px 13px;margin-bottom:18px;transition:border-color .15s,color .15s}
  .backhub:hover{border-color:var(--gold);color:var(--gold)}
  header{text-align:center;margin-bottom:24px}
  .titlerow{display:flex;align-items:center;justify-content:center;gap:12px}
  .kcmark{width:46px;height:46px;flex:none;display:block}
  .kicker{letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-size:11px;font-weight:700}
  h1{font-size:27px;margin:6px 0 2px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:13.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:12px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 8px 10px;
    cursor:pointer;font-family:inherit;color:var(--txt);display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .12s,border-color .12s}
  .tile:hover{transform:translateY(-2px);border-color:var(--gold)}
  .tile img{height:46px;width:auto;border-radius:3px;border:1px solid var(--line);box-shadow:0 3px 8px rgba(0,0,0,.35)}
  .tile span{font-size:12px;font-weight:600;text-align:center;line-height:1.25;color:#d3dceb}
  .pop{position:fixed;inset:0;background:rgba(6,8,11,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .pop.on{display:flex}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 30px 26px;text-align:center;max-width:440px;width:100%;max-height:88vh;overflow:auto;position:relative}
  .pcard img{height:140px;width:auto;border-radius:6px;border:1px solid var(--line);box-shadow:0 10px 28px rgba(0,0,0,.5)}
  .pcard .pn{font-size:23px;font-weight:800;letter-spacing:-.4px;margin-top:16px}
  .pcard .ptriv{color:#c5d0de;font-size:14.5px;line-height:1.62;margin:14px 0 0;text-align:left}
  .pclose{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;font-family:inherit}
  .pclose:hover{color:var(--txt)}
</style>
</head>
<body>
<div class="wrap">
  <a class="backhub" href="index.html">&lsaquo; All games</a>
  <header>
    <div class="kicker">Betting Premier League &middot; World Cup 2026</div>
    <div class="titlerow"><img class="kcmark" src="branding/kc_monogram.png" alt="KC"><h1>Flag Almanac</h1></div>
    <div class="sub">All 48 nations &middot; tap a flag for the story behind it</div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<div class="pop" id="pop">
  <div class="pcard">
    <button class="pclose" id="pclose" aria-label="Close">&times;</button>
    <img id="pflag" src="" alt="">
    <div class="pn" id="pname"></div>
    <p class="ptriv" id="ptriv"></p>
  </div>
</div>

<script>
const FL=[{"n": "Algeria", "c": "dz", "t": "Green and white halves with a red star and crescent. Green and white stand for Islam and peace; the red crescent and star recall the blood of independence fighters."}, {"n": "Argentina", "c": "ar", "t": "Three bands of light blue, white and light blue, centred on the golden Sun of May — a national emblem tied to the 1810 revolution that began independence from Spain."}, {"n": "Australia", "c": "au", "t": "A blue ensign carrying the British Union Jack, the large white Commonwealth Star, and the five stars of the Southern Cross, the constellation of the southern sky."}, {"n": "Austria", "c": "at", "t": "The red-white-red triband is among the world's oldest flags. Legend says a duke's white tunic was soaked red in battle, staying white only where his belt had been."}, {"n": "Belgium", "c": "be", "t": "Vertical black, yellow and red, taken from the arms of the Duchy of Brabant — a gold lion with red claws and tongue on a black field."}, {"n": "Bosnia & Herzegovina", "c": "ba", "t": "Blue with a yellow triangle whose three points represent the country's three peoples, and a line of white stars. A deliberately neutral design adopted in 1998."}, {"n": "Brazil", "c": "br", "t": "Green field, yellow rhombus and a blue celestial globe showing the sky over Rio on 15 November 1889, banded with the motto 'Ordem e Progresso' (Order and Progress)."}, {"n": "Canada", "c": "ca", "t": "Red-white-red with a single red eleven-pointed maple leaf, adopted in 1965 to give Canada a distinct flag of its own."}, {"n": "Cape Verde", "c": "cv", "t": "Blue with a white-red-white stripe and a ring of ten yellow stars, one for each of the ten main islands of the Atlantic archipelago."}, {"n": "Colombia", "c": "co", "t": "Yellow filling the top half, then blue and red. Yellow for the land's gold and riches, blue for the seas and sky, red for the blood spilt for freedom."}, {"n": "Croatia", "c": "hr", "t": "Red, white and blue with the famous red-and-white chequy shield, topped by a crown of five smaller shields for the country's historic regions."}, {"n": "Curacao", "c": "cw", "t": "Blue with a yellow stripe and two white stars — the deep blue Caribbean and sky, and the two stars for Curaçao and its islet, Klein Curaçao."}, {"n": "Czechia", "c": "cz", "t": "White over red with a blue triangle at the hoist — inherited from the old Czechoslovak flag and kept after the split with Slovakia."}, {"n": "DR Congo", "c": "cd", "t": "Sky blue with a yellow-edged red diagonal stripe and a yellow star. Blue for peace, red for the blood of the country's martyrs, yellow for its wealth."}, {"n": "Ecuador", "c": "ec", "t": "Yellow, blue and red with the national arms over Mount Chimborazo. It shares the Gran Colombia colours with Colombia and Venezuela, so the crest tells them apart."}, {"n": "Egypt", "c": "eg", "t": "Red, white and black bands with the golden Eagle of Saladin at the centre — the Arab Liberation colours used across several Arab republics."}, {"n": "England", "c": "gb-eng", "t": "The Cross of St George: a red cross on white, named for England's patron saint and flown since the late Middle Ages."}, {"n": "France", "c": "fr", "t": "The blue-white-red Tricolore of the Revolution. Blue and red are the colours of Paris, placed around the white of the monarchy."}, {"n": "Germany", "c": "de", "t": "Black, red and gold horizontal bands, colours linked to the 19th-century struggle for a united, democratic Germany."}, {"n": "Ghana", "c": "gh", "t": "Red, gold and green with a black star — the 'black star of African freedom'. Gold for mineral wealth, green for forests, red for those who died for liberty."}, {"n": "Haiti", "c": "ht", "t": "Blue over red beneath the national arms. It was made in 1803 by tearing the white from the French Tricolore, symbolising the break from France."}, {"n": "Iran", "c": "ir", "t": "Green, white and red with the national emblem at the centre, and 'Allahu Akbar' written 22 times in stylised script along the edges of the bands."}, {"n": "Iraq", "c": "iq", "t": "Red, white and black bands with the green takbir — 'Allahu Akbar' — inscribed across the central white stripe."}, {"n": "Ivory Coast", "c": "ci", "t": "Vertical orange, white and green: orange for the northern savanna, white for peace, green for the southern forests. (A mirror of Ireland's flag.)"}, {"n": "Japan", "c": "jp", "t": "A white field with one crimson disc, the Hinomaru or 'sun-mark', evoking the sun goddess and Japan as the Land of the Rising Sun."}, {"n": "Jordan", "c": "jo", "t": "Black, white and green bands with a red triangle and a white seven-pointed star — the seven verses of the Quran's opening chapter. Pan-Arab colours."}, {"n": "Mexico", "c": "mx", "t": "Green, white and red with the founding legend of the Aztecs: an eagle perched on a cactus, devouring a serpent, marking the site of Tenochtitlan."}, {"n": "Morocco", "c": "ma", "t": "A red field bearing a green five-pointed star, the interlaced 'Seal of Solomon'."}, {"n": "Netherlands", "c": "nl", "t": "Red, white and blue — one of the oldest tricolours. Its top band was originally orange, for the House of Orange, before fading to red."}, {"n": "New Zealand", "c": "nz", "t": "A blue ensign with the Union Jack and four red, white-bordered stars of the Southern Cross."}, {"n": "Norway", "c": "no", "t": "Red with a blue Scandinavian cross outlined in white — the offset cross design shared across the Nordic nations."}, {"n": "Panama", "c": "pa", "t": "Quartered into white, red and blue with two stars. The colours nod to the rival political parties, with white for the peace between them."}, {"n": "Paraguay", "c": "py", "t": "Red, white and blue — and uniquely among nations, it shows different emblems on each side: the national arms on the front, the treasury seal on the back."}, {"n": "Portugal", "c": "pt", "t": "Green and red with an armillary sphere from the age of exploration, over the shield of castles and the blue 'quinas' of the old kingdom."}, {"n": "Qatar", "c": "qa", "t": "Maroon with a white nine-point serrated band. The maroon began as a red dye faded by the sun, and now sets Qatar apart from Bahrain's similar flag."}, {"n": "Saudi Arabia", "c": "sa", "t": "Green with the Islamic declaration of faith in white Arabic script above a sword. Green is the sacred colour of Islam; the flag is never flown at half-mast."}, {"n": "Scotland", "c": "gb-sct", "t": "The Saltire: a white diagonal cross of St Andrew on a blue field, claimed to be one of the oldest national flags in the world."}, {"n": "Senegal", "c": "sn", "t": "Vertical green, yellow and red with a green star — the Pan-African colours, plus a star for unity and hope."}, {"n": "South Africa", "c": "za", "t": "Six colours in a sideways Y, adopted in 1994 at the end of apartheid. The converging Y stands for the coming together of a diverse nation."}, {"n": "South Korea", "c": "kr", "t": "A white field with the red-and-blue taegeuk (yin-yang) and four black trigrams from the I Ching at the corners, representing balance and harmony."}, {"n": "Spain", "c": "es", "t": "Red-yellow-red ('la Rojigualda') with the coat of arms, including the Pillars of Hercules wrapped in the motto 'Plus Ultra'."}, {"n": "Sweden", "c": "se", "t": "Blue with a yellow Scandinavian cross, the colours drawn from the national coat of arms."}, {"n": "Switzerland", "c": "ch", "t": "A bold white cross on red — and, with Vatican City, one of only two square national flags in the world."}, {"n": "Tunisia", "c": "tn", "t": "Red with a white disc holding a red crescent and star, a design rooted in its Ottoman past."}, {"n": "Turkey", "c": "tr", "t": "Red with a white crescent and star, the enduring emblems carried from the Ottoman Empire into modern Türkiye."}, {"n": "United States", "c": "us", "t": "Thirteen red and white stripes for the original colonies, and a blue canton of fifty white stars, one for each state."}, {"n": "Uruguay", "c": "uy", "t": "Nine blue and white stripes for the country's original departments, with the golden Sun of May in the upper hoist."}, {"n": "Uzbekistan", "c": "uz", "t": "Blue, white and green bands divided by thin red lines, with a white crescent and twelve stars near the hoist."}];
const grid=document.getElementById('grid');
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
FL.forEach(d=>{
  const b=document.createElement('button'); b.className='tile';
  b.innerHTML='<img loading="lazy" src="https://flagcdn.com/h60/'+d.c+'.png" alt="" onerror="this.style.visibility=\'hidden\'"><span>'+esc(d.n)+'</span>';
  b.onclick=()=>openPop(d); grid.appendChild(b);
});
const pop=document.getElementById('pop');
function openPop(d){
  document.getElementById('pflag').src='https://flagcdn.com/h240/'+d.c+'.png';
  document.getElementById('pname').textContent=d.n;
  document.getElementById('ptriv').textContent=d.t;
  pop.classList.add('on');
}
function closePop(){ pop.classList.remove('on'); }
document.getElementById('pclose').onclick=closePop;
pop.onclick=e=>{ if(e.target.id==='pop') closePop(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePop(); });
</script>
</body>
</html>
