<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL 2026 · Flag Almanac</title>
<meta property="og:type" content="website">
<meta property="og:title" content="BPL Flag Almanac">
<meta property="og:description" content="The flags of all 48 World Cup 2026 nations, with the story behind each nickname.">
<meta property="og:image" content="https://kc-siddharth.github.io/bpl-2026/branding/kc_share.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="icon" type="image/png" href="https://kc-siddharth.github.io/bpl-2026/branding/kc_favicon.png">
<link rel="apple-touch-icon" href="https://kc-siddharth.github.io/bpl-2026/branding/apple-touch-icon.png">
<style>
  :root{--bg:#0b1018;--panel:#141c27;--panel2:#1b2532;--line:#243042;--txt:#eaf0f7;
    --muted:#8194ac;--gold:#f4c64a;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:30px 18px 70px}
  .backhub{display:inline-flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:5px 13px;margin-bottom:18px;transition:border-color .15s,color .15s}
  .backhub:hover{border-color:var(--gold);color:var(--gold)}
  header{text-align:center;margin-bottom:24px}
  .titlerow{display:flex;align-items:center;justify-content:center;gap:12px}
  .kcmark{width:46px;height:46px;flex:none;display:block}
  .kicker{letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-size:11px;font-weight:700}
  h1{font-size:27px;margin:6px 0 2px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:13.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:12px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 8px 10px;
    cursor:pointer;font-family:inherit;color:var(--txt);display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .12s,border-color .12s}
  .tile:hover{transform:translateY(-2px);border-color:var(--gold)}
  .tile img{height:46px;width:auto;border-radius:3px;border:1px solid var(--line);box-shadow:0 3px 8px rgba(0,0,0,.35)}
  .tile span{font-size:12px;font-weight:600;text-align:center;line-height:1.25;color:#d3dceb}
  .pop{position:fixed;inset:0;background:rgba(6,8,11,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .pop.on{display:flex}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 30px 26px;text-align:center;max-width:440px;width:100%;max-height:88vh;overflow:auto;position:relative}
  .pcard img{height:140px;width:auto;border-radius:6px;border:1px solid var(--line);box-shadow:0 10px 28px rgba(0,0,0,.5)}
  .pcard .pn{font-size:23px;font-weight:800;letter-spacing:-.4px;margin-top:16px}
  .pcard .pnick{color:var(--gold);font-size:13.5px;font-weight:600;margin-top:4px}
  .pcard .ptriv{color:#c5d0de;font-size:14.5px;line-height:1.62;margin:16px 0 0;text-align:left}
  .pclose{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;font-family:inherit}
  .pclose:hover{color:var(--txt)}
</style>
</head>
<body>
<div class="wrap">
  <a class="backhub" href="index.html">&lsaquo; All games</a>
  <header>
    <div class="kicker">Betting Premier League &middot; World Cup 2026</div>
    <div class="titlerow"><img class="kcmark" src="branding/kc_monogram.png" alt="KC"><h1>Flag Almanac</h1></div>
    <div class="sub">All 48 nations &middot; tap a flag for the story behind its nickname</div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<div class="pop" id="pop">
  <div class="pcard">
    <button class="pclose" id="pclose" aria-label="Close">&times;</button>
    <img id="pflag" src="" alt="">
    <div class="pn" id="pname"></div>
    <div class="pnick" id="pnick"></div>
    <p class="ptriv" id="ptriv"></p>
  </div>
</div>

<script>
const FL=[{"n": "Algeria", "c": "dz", "nick": "Les Fennecs (Desert Foxes)", "triv": "Named after the fennec, the small big-eared fox native to the Sahara, a symbol of cunning and survival in harsh terrain. Some 2026 coverage renders it as 'Desert Warriors'."}, {"n": "Argentina", "c": "ar", "nick": "La Albiceleste", "triv": "Means 'the white and sky blue', the colours of the flag and the famous striped shirt. One of the most recognisable kits in world football."}, {"n": "Australia", "c": "au", "nick": "Socceroos", "triv": "A blend of 'soccer' and 'kangaroo', the national animal, coined in 1967 ahead of a tour. It stuck instantly and is football's only kangaroo-themed nickname."}, {"n": "Austria", "c": "at", "nick": "Das Team", "triv": "Simply 'the team' in German. A plain, literal nickname with no imagery or story behind it."}, {"n": "Belgium", "c": "be", "nick": "Red Devils", "triv": "Taken from the red home kit, the name dates back over a century to the early 1900s. There is no diabolical meaning, just the colour."}, {"n": "Bosnia & Herzegovina", "c": "ba", "nick": "Zmajevi (The Dragons)", "triv": "'Dragons' in Bosnian, drawn from local legend and heraldic tradition. Often linked to the medieval nobleman Hrvoje Vukcic Hrvatinic and the dragon imagery of the era."}, {"n": "Brazil", "c": "br", "nick": "Selecao / Canarinho", "triv": "'Selecao' just means 'the selection', the national side. 'Canarinho', little canary, refers to the bright yellow shirt adopted in the 1950s."}, {"n": "Canada", "c": "ca", "nick": "Les Rouges", "triv": "French for 'the Reds', after the dominant red of the kit and the maple-leaf flag. A bilingual nod, since Canada has both English and French as official languages."}, {"n": "Cape Verde", "c": "cv", "nick": "Tubaroes Azuis (Blue Sharks)", "triv": "'Blue Sharks' in Portuguese, with a shark on the team crest. The blue represents the deep Atlantic that surrounds the island archipelago."}, {"n": "Colombia", "c": "co", "nick": "Los Cafeteros", "triv": "'The Coffee Growers', honouring Colombia's famous coffee production. The team is also called La Tricolor after the yellow-blue-red flag."}, {"n": "Croatia", "c": "hr", "nick": "Vatreni (The Fiery Ones)", "triv": "'The Blazing Ones', for the team's passionate style. They are also known as Kockasti, 'the chequered', after the red-and-white chessboard shirt."}, {"n": "Curacao", "c": "cw", "nick": "The Blue Wave", "triv": "A reference to the blue Caribbean sea around the island and the blue of the flag. Fitting for the smallest nation ever to reach a World Cup, with a sailboat on its crest."}, {"n": "Czechia", "c": "cz", "nick": "Narodak / Repre", "triv": "Casual Czech slang short for 'narodni tym' and 'reprezentace', both meaning 'the national team'. Unpretentious and very Czech, with no imagery attached."}, {"n": "DR Congo", "c": "cd", "nick": "Leopards", "triv": "The leopard is a national symbol of DR Congo and appears on the coat of arms. It embodies strength and the wild beauty of the Congo basin."}, {"n": "Ecuador", "c": "ec", "nick": "La Tri (La Tricolor)", "triv": "Named for the yellow, blue and red tricolour flag. It overlaps with the 'Tri' nicknames of Colombia and Mexico, so it can be ambiguous."}, {"n": "Egypt", "c": "eg", "nick": "The Pharaohs", "triv": "Connects the team to the ancient rulers of one of the world's oldest civilisations. Fans sometimes wear pharaonic headdresses in support."}, {"n": "England", "c": "gb-eng", "nick": "Three Lions", "triv": "From the three lions on the royal coat of arms, used by English monarchs since the 12th century. Immortalised by the 1996 fan anthem of the same name."}, {"n": "France", "c": "fr", "nick": "Les Bleus", "triv": "'The Blues', after the blue home shirt. Blue is the historic colour of France, from the royal standard through to the Republic."}, {"n": "Germany", "c": "de", "nick": "Die Mannschaft", "triv": "Literally 'the team' in German, pushed as an official brand around 2015. Plain by design, and quietly retired by the federation for a spell."}, {"n": "Ghana", "c": "gh", "nick": "Black Stars", "triv": "Named after the black star on the flag, itself taken from Marcus Garvey's Black Star Line. A symbol of pan-African pride and Ghana's place as the first sub-Saharan nation to gain independence."}, {"n": "Haiti", "c": "ht", "nick": "Les Grenadiers", "triv": "'The Grenadiers', evoking the soldiers of the Haitian Revolution. It ties the team to the world's first successful slave revolt and independent Black republic."}, {"n": "Iran", "c": "ir", "nick": "Team Melli", "triv": "'Melli' means 'national' in Persian, so it simply means 'the national team'. It is the universal term Iranians use across all sports."}, {"n": "Iraq", "c": "iq", "nick": "Lions of Mesopotamia", "triv": "Honours ancient Mesopotamia, the 'cradle of civilisation' between the Tigris and Euphrates. The lion was a royal symbol in Babylon and Assyria."}, {"n": "Ivory Coast", "c": "ci", "nick": "The Elephants (Les Elephants)", "triv": "Named after the African elephant, source of the 'Ivory' in the country's name. The crest shows an elephant balancing a football."}, {"n": "Japan", "c": "jp", "nick": "Samurai Blue", "triv": "Combines the warrior spirit of the samurai with the blue of the national kit. Adopted as the official nickname in the 2000s."}, {"n": "Jordan", "c": "jo", "nick": "Al-Nashama (The Chivalrous Ones)", "triv": "An Arabic word denoting nobility, chivalry and gallantry. It reflects the warrior and tribal honour traditions associated with Jordan."}, {"n": "Mexico", "c": "mx", "nick": "El Tri", "triv": "Short for 'El Tricolor', the green-white-red of the flag worn on the shirt. Not to be confused with Ecuador's 'La Tri'."}, {"n": "Morocco", "c": "ma", "nick": "Atlas Lions", "triv": "Named after the Barbary (Atlas) lions that once roamed the Atlas Mountains of North Africa, now extinct in the wild. One of the tournament's most evocative nicknames."}, {"n": "Netherlands", "c": "nl", "nick": "Oranje", "triv": "'Orange', after the royal House of Orange-Nassau. The flag is red-white-blue, but orange stays the national colour, hence the kit and the nickname."}, {"n": "New Zealand", "c": "nz", "nick": "All Whites", "triv": "Named for the all-white kit, coined as a deliberate counterpart to the famous All Blacks rugby team."}, {"n": "Norway", "c": "no", "nick": "Lovene (The Lions)", "triv": "'The Lions', after the crowned lion on Norway's royal coat of arms. A relatively lightly used nickname."}, {"n": "Panama", "c": "pa", "nick": "Los Canaleros", "triv": "'The Canal Men', after the Panama Canal that defines the country. The team is also called La Marea Roja, 'the Red Tide'."}, {"n": "Paraguay", "c": "py", "nick": "La Albirroja", "triv": "'The white and red', after the two colours of the flag and the striped shirt. A straightforward colour nickname."}, {"n": "Portugal", "c": "pt", "nick": "Selecao das Quinas", "triv": "'The team of the Quinas', the five blue shields on the coat of arms. Each shield bears five dots said to represent the five wounds of Christ."}, {"n": "Qatar", "c": "qa", "nick": "The Maroons (Al Annabi)", "triv": "'Al Annabi' means maroon, the deep colour of the flag and kit. The shade is what distinguishes Qatar from neighbouring Bahrain's red."}, {"n": "Saudi Arabia", "c": "sa", "nick": "Green Falcons", "triv": "Green is the sacred colour of the Saudi flag, and the falcon is revered across the Arabian Peninsula. Together they signal heritage and pride."}, {"n": "Scotland", "c": "gb-sct", "nick": "Tartan Army", "triv": "Strictly the name of the travelling supporters rather than the team, taken from the criss-cross tartan of Highland dress. There is no single agreed nickname for the side itself."}, {"n": "Senegal", "c": "sn", "nick": "Lions of Teranga", "triv": "'Teranga' is the Wolof word for hospitality, a core Senegalese value. The lion is the national symbol, appearing on the coat of arms."}, {"n": "South Africa", "c": "za", "nick": "Bafana Bafana", "triv": "Zulu for 'the boys', a term of affection that became official in the 1990s as the country returned to international football after apartheid."}, {"n": "South Korea", "c": "kr", "nick": "Taegeuk Warriors", "triv": "Named after the taeguk, the red-and-blue yin-yang symbol at the centre of the Korean flag. The team is also called 'the Reds' for its kit."}, {"n": "Spain", "c": "es", "nick": "La Roja", "triv": "'The red one', after the bright red shirt. It became iconic during Spain's golden run of three straight major titles between 2008 and 2012."}, {"n": "Sweden", "c": "se", "nick": "Blagult", "triv": "'Blue and yellow', the colours of the Swedish flag and kit. A direct, descriptive nickname."}, {"n": "Switzerland", "c": "ch", "nick": "La Nati (short for Nationalmannschaft)", "triv": "Short for 'Nationalmannschaft', simply 'the national team'. Used affectionately, with no imagery behind it."}, {"n": "Tunisia", "c": "tn", "nick": "Eagles of Carthage", "triv": "Links the team to ancient Carthage, the great Mediterranean power based in modern Tunisia. The eagle stands for strength and ambition."}, {"n": "Turkey", "c": "tr", "nick": "Ay-Yildizlilar (Crescent-Stars)", "triv": "Named after the crescent and star on the Turkish flag, among the most recognisable symbols in the world. Hence the common 'Crescent-Stars'."}, {"n": "United States", "c": "us", "nick": "The Stars and Stripes; The Yanks", "triv": "A direct reference to the national flag, the Star-Spangled Banner. The team is also informally called 'the Yanks'."}, {"n": "Uruguay", "c": "uy", "nick": "La Celeste", "triv": "'The sky blue', after the pale blue shirt. Uruguay also invoke 'garra charrua', the fighting spirit of the indigenous Charrua people."}, {"n": "Uzbekistan", "c": "uz", "nick": "White Wolves", "triv": "The wolf is a sacred symbol in Uzbek culture, standing for freedom and resilience. White reflects purity and the snow-capped peaks of the mountains."}];
const grid=document.getElementById('grid');
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
FL.forEach(d=>{
  const b=document.createElement('button'); b.className='tile';
  b.innerHTML='<img loading="lazy" src="https://flagcdn.com/h60/'+d.c+'.png" alt="" onerror="this.style.visibility=\'hidden\'"><span>'+esc(d.n)+'</span>';
  b.onclick=()=>openPop(d); grid.appendChild(b);
});
const pop=document.getElementById('pop');
function openPop(d){
  document.getElementById('pflag').src='https://flagcdn.com/h240/'+d.c+'.png';
  document.getElementById('pname').textContent=d.n;
  document.getElementById('pnick').textContent=d.nick;
  document.getElementById('ptriv').textContent=d.triv;
  pop.classList.add('on');
}
function closePop(){ pop.classList.remove('on'); }
document.getElementById('pclose').onclick=closePop;
pop.onclick=e=>{ if(e.target.id==='pop') closePop(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePop(); });
</script>
</body>
</html>
